<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>สมัครสมาชิก - APC</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="form-container">
    <h2>สมัครสมาชิก</h2>
    <form id="registerForm">
      <input type="text" placeholder="ชื่อผู้ใช้" id="reg-username" required />
      <input type="password" placeholder="รหัสผ่าน" id="reg-password" required />
      <button type="submit">สมัครสมาชิก</button>
      <p>มีบัญชีแล้ว? <a href="login.html">เข้าสู่ระบบ</a></p>
    </form>
  </div>
  <script src="script.js"></script>
</body>
</html>
